<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ML API</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Pacifico" type="text/css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Arimo" type="text/css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Hind:300" type="text/css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300" type="text/css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="login">
    <h1>Crop Prediction Model</h1>
    <form action="/predict" method="post">
        <input type="text" name="Nitrogen" placeholder="Nitrogen" required="required"/>
        <input type="text" name="Phosphorus" placeholder="Phosphorus" required="required"/>
        <input type="text" name="Potassium" placeholder="Potassium" required="required"/>
        <input type="text" name="Temperature" placeholder="Temperature" required="required"/>
        <input type="text" name="Humidity" placeholder="Humidity" required="required"/>
        <input type="text" name="pH" placeholder="pH" required="required"/>
        <input type="text" name="Rainfall" placeholder="Rainfall" required="required"/>

        <button type="submit" class="btn btn-primary btn-block btn-large">PREDICT</button>
    </form>
    <h1 id="predi">
        {{ prediction_text }}
    </h1>
</div>
</body>
</html>
